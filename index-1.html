<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA_CENTRAL_LOURENCO :: ACESSO_RESTRITO</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #D4AF37;
            --bg-dark: #000000;
            --terminal-bg: #030303;
            --dracula-green: #50fa7b;
            --dracula-pink: #ff79c6;
            --dracula-cyan: #8be9fd;
            --dracula-red: #ff5555;
            --dracula-yellow: #f1fa8c;
        }

        body { 
            background-color: var(--bg-dark); 
            font-family: 'Inter', sans-serif; 
            color: #eee; 
            margin: 0;
            overflow-x: hidden;
        }

        /* Hero / Terminal */
        .hero-section {
            padding: 20px 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            transition: background-color 0.2s;
        }

        .terminal-window {
            background: var(--terminal-bg);
            border: 1px solid #222;
            font-family: 'Fira Code', monospace;
            border-radius: 6px;
            overflow: hidden;
            width: 100%;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.05);
        }

        .terminal-header {
            background: #111;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #222;
        }

        .terminal-body {
            padding: 20px;
            color: #f8f8f2;
            font-size: 0.82rem;
            height: 650px;
            overflow-y: auto;
            line-height: 1.4;
        }

        .t-user { color: var(--dracula-green); font-weight: bold; }
        .t-info { color: var(--dracula-cyan); }
        .t-warn { color: var(--dracula-red); font-weight: bold; }
        .t-cmd { color: var(--dracula-pink); }
        .t-str { color: var(--dracula-yellow); }
        
        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--dracula-green);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Content Sections */
        .main-content { background: #050505; border-top: 2px solid var(--accent); padding: 80px 0; }
        .profile-img { width: 150px; border-radius: 50%; border: 3px solid var(--accent); padding: 5px; }
        
        .repo-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            height: 100%;
            transition: 0.3s;
            text-align: left;
        }
        .repo-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .lang-badge { font-size: 0.6rem; color: var(--accent); border: 1px solid var(--accent); padding: 2px 8px; border-radius: 10px; text-transform: uppercase; font-weight: bold; }
        .hidden { display: none !important; }
        
        footer { padding: 40px 0; color: #444; font-size: 0.7rem; border-top: 1px solid #111; }
    </style>
</head>
<body>

<section class="hero-section" id="hero">
    <div class="container">
        <div class="terminal-window">
            <div class="terminal-header">
                <div><span style="color:#ff5f56">●</span> <span style="color:#ffbd2e">●</span> <span style="color:#27c93f">●</span></div>
                <small class="text-secondary fw-bold">DEEP_OSINT_SCANNER_v3.0.sh</small>
            </div>
            <div class="terminal-body" id="terminal-content">
                <div class="text-secondary small mb-2">// ESTABELECENDO HANDSHAKE COM O ALVO...</div>
            </div>
        </div>
    </div>
</section>

<div id="ad-test" style="height:1px;width:1px;position:absolute;left:-999px" class="ad-banner"></div>

<div class="main-content" id="profile">
    <div class="container text-center">
        <img src="images/Picture2.png" class="profile-img mb-4 shadow-lg">
        <h1 class="fw-bold mb-2" style="color:var(--accent)">Lourenço Cavalcante</h1>
        <p class="text-secondary lead mb-5">Professor de Computação | Pesquisador em IA (INPE/IFTO)</p>
        
        <div class="row g-4" id="repo-grid">
            </div>
    </div>
</div>

<footer class="text-center">
    <p>© 2026 Prof. Lourenço Cavalcante | Geolocation Services via IPAPI | Neural Engine Sim.</p>
</footer>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const terminal = document.getElementById('terminal-content');
    const latIFTO = -10.1845; // Latitude IFTO/Palmas
    const lonIFTO = -48.3336; // Longitude IFTO/Palmas

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return (R * c).toFixed(2);
    }

    async function print(html, delay = 100) {
        const div = document.createElement('div');
        div.innerHTML = html;
        terminal.appendChild(div);
        terminal.scrollTop = terminal.scrollHeight;
        await new Promise(r => setTimeout(r, delay));
    }

    async function startExploitation() {
        await print(`<span class="t-user">root@lourenco</span>:<span class="t-info">~</span>$ ./scan_v3 --deep-analyze`, 800);
        
        // Coleta de Dados Reais
        let ipData = { ip: "127.0.0.1", latitude: latIFTO, longitude: lonIFTO, city: "Unknown" };
        try {
            const res = await fetch('https://ipapi.co/json/');
            ipData = await response = await res.json();
        } catch(e) {}

        const gpu = (function() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            return debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "Unknown GPU";
        })();

        const isAdblock = document.getElementById('ad-test').offsetHeight === 0;
        const memory = navigator.deviceMemory || "N/A";
        const cores = navigator.hardwareConcurrency || "N/A";

        // Impressão Agressiva
        await print(`<span class="t-warn">[!] ALVO IDENTIFICADO NA CAMADA DE TRANSPORTE</span>`, 400);
        await print(`<span class="t-info">> IP_ADDRESS:</span> ${ipData.ip}`, 200);
        await print(`<span class="t-info">> GEOLOC:</span> ${ipData.city}, ${ipData.region} - ${ipData.country_name}`, 200);
        
        const dist = getDistance(latIFTO, lonIFTO, ipData.latitude, ipData.longitude);
        await print(`<span class="t-info">> PROXIMIDADE:</span> Alvo localizado a <b>${dist}km</b> do Laboratório Central.`, 400);
        
        await print(`<span class="t-info">> HARDWARE:</span> CPU ${cores} Cores | RAM ${memory}GB`, 200);
        await print(`<span class="t-info">> GPU_VENDOR:</span> <span class="t-str">${gpu}</span>`, 200);
        await print(`<span class="t-info">> SEGURANÇA:</span> AdBlock ${isAdblock ? '<span class="t-warn">ATIVO (Detectado)</span>' : 'INATIVO'}`, 200);
        
        await print(`<br><span class="t-warn">[SISTEMA]: INICIANDO ANALISE COMPORTAMENTAL (MODELO_IA_V8)...</span>`, 800);
        await print(`<span class="text-secondary"># Processando pacotes via Rede Neural... [OK]</span>`, 100);
        await print(`<span class="t-info">> PERFIL_PROVÁVEL:</span> Desenvolvedor / Estudante Curioso detectado.`, 300);
        await print(`<span class="t-info">> STATUS_SESSÃO:</span> Monitorado em tempo real.`, 300);
        
        // Efeito de glitch visual rápido
        document.getElementById('hero').style.backgroundColor = "#200";
        setTimeout(() => document.getElementById('hero').style.backgroundColor = "#000", 150);

        await print(`<br><span class="t-user">root@lourenco</span>:<span class="t-info">~</span>$ echo "O futuro não é mais o que costumava ser."`, 800);
        await print(`<span class="t-user">root@lourenco</span>:<span class="t-info">~</span>$ echo "Sua segurança é uma ilusão que o navegador sustenta."`, 800);
        await print(`<span class="t-user">root@lourenco</span>:<span class="t-info">~</span>$ echo "Bem-vindo ao meu domínio acadêmico."`, 800);

        await print(`<br><span class="t-user">root@lourenco</span>:<span class="t-info">~</span>$ <span class="cursor"></span>`, 100);
        
        setTimeout(() => {
            document.getElementById('profile').scrollIntoView({ behavior: 'smooth' });
        }, 2000);
    }

    function fetchRepos() {
        $.ajax({
            url: `https://api.github.com/users/lourencocavalcante/repos?sort=updated`,
            success: function(repos) {
                let html = "";
                repos.slice(0, 9).forEach(repo => {
                    html += `
                    <div class="col-lg-4 col-md-6">
                        <div class="repo-card d-flex flex-column">
                            <div class="d-flex justify-content-between mb-3">
                                <span class="lang-badge">${repo.language || "Projeto"}</span>
                                <i class="fab fa-github text-secondary"></i>
                            </div>
                            <h6 class="text-white fw-bold text-capitalize">${repo.name.replace(/-/g, ' ')}</h6>
                            <p class="text-secondary small flex-grow-1">${repo.description || "PoC desenvolvida pelo Prof. Lourenço."}</p>
                            <div class="mt-3 pt-3 border-top border-secondary d-flex justify-content-between">
                                <span class="text-muted small">${new Date(repo.pushed_at).toLocaleDateString()}</span>
                                <a href="${repo.html_url}" target="_blank" class="text-warning text-decoration-none small fw-bold">ACCESS_CODE <i class="fa fa-arrow-right ms-1"></i></a>
                            </div>
                        </div>
                    </div>`;
                });
                $("#repo-grid").html(html);
            }
        });
    }

    window.onload = () => {
        startExploitation();
        fetchRepos();
    };
</script>
</body>
</html>
