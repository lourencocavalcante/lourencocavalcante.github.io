<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lourenço Cavalcante | System Breach</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #D4AF37;
            --bg-dark: #050505;
            --terminal-bg: #000;
            --dracula-green: #50fa7b;
            --dracula-pink: #ff79c6;
            --dracula-cyan: #8be9fd;
            --dracula-red: #ff5555;
        }

        body { background-color: #0a0a0a; font-family: 'Inter', sans-serif; color: #fff; }

        /* --- Terminal Hacker --- */
        .hero-section {
            padding: 40px 0;
            min-height: 85vh;
            display: flex;
            align-items: center;
        }

        .terminal-window {
            background: var(--terminal-bg);
            border-radius: 6px;
            box-shadow: 0 0 30px rgba(80, 250, 123, 0.1);
            border: 1px solid #1a1a1a;
            font-family: 'Fira Code', monospace;
        }

        .terminal-header {
            background: #1a1a1a;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .terminal-body {
            padding: 20px;
            color: #f8f8f2;
            font-size: 0.95rem;
            min-height: 450px;
        }

        .t-user { color: var(--dracula-green); }
        .t-cmd { color: var(--dracula-pink); }
        .t-info { color: var(--dracula-cyan); }
        .t-warn { color: var(--dracula-red); font-weight: bold; }
        
        .cursor {
            display: inline-block;
            width: 8px;
            height: 17px;
            background: var(--dracula-green);
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- Perfil --- */
        .profile-section { background: #111; border-top: 2px solid var(--accent); padding: 50px 0; }
        .profile-img { width: 160px; height: 160px; border-radius: 50%; border: 3px solid var(--accent); }
        
        .repo-card { background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 8px; height: 100%; transition: 0.3s; }
        .repo-card:hover { border-color: var(--dracula-green); transform: scale(1.02); }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<section class="hero-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="terminal-window">
                    <div class="terminal-header">
                        <div>
                            <span style="color: #ff5f56">●</span>
                            <span style="color: #ffbd2e">●</span>
                            <span style="color: #27c93f">●</span>
                        </div>
                        <small class="text-secondary">bash — 80x24</small>
                    </div>
                    <div class="terminal-body" id="terminal-content">
                        </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div class="profile-section">
    <div class="container text-center">
        <img src="images/Picture2.png" class="profile-img mb-4 shadow" alt="Lourenço">
        <h2 class="fw-bold" style="color: var(--accent)">Lourenço Cavalcante</h2>
        <p class="text-secondary">Professor @ IFTO | Mestrando IA @ INPE</p>
        <div class="mt-4">
            <a href="https://github.com/lourencocavalcante" target="_blank" class="btn btn-outline-warning btn-sm mx-2">GitHub</a>
            <a href="https://linkedin.com/in/lourenco-cavalcante-790b24121/" target="_blank" class="btn btn-outline-warning btn-sm mx-2">LinkedIn</a>
        </div>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<script>
    const container = document.getElementById('terminal-content');

    async function typeLine(html, delay = 500) {
        const div = document.createElement('div');
        div.className = 'mb-1';
        div.innerHTML = html;
        container.appendChild(div);
        await new Promise(r => setTimeout(r, delay));
    }

    async function startHacking() {
        // Inicialização
        await typeLine(`<span class="text-secondary">[SYSTEM] Initializing intrusion protocol...</span>`, 1000);
        await typeLine(`<span class="t-user">root@lourenco</span>:<span class="t-info">~</span>$ nmap -sV target_visitor`, 600);
        
        // Dados Reais do Visitante
        const userAgent = navigator.userAgent;
        const platform = navigator.platform;
        const screenRes = `${window.screen.width}x${window.screen.height}`;
        
        let ipData = { ip: "127.0.0.1", city: "Unknown" };
        try {
            const response = await fetch('https://ipapi.co/json/');
            ipData = await response.json();
        } catch(e) { /* Ignora se houver block de ad-block */ }

        await typeLine(`<span class="t-warn">ALERTA: Alvo detectado!</span>`, 400);
        await typeLine(`<span class="t-info">> IP ADDRESS:</span> ${ipData.ip}`, 300);
        await typeLine(`<span class="t-info">> LOCATION:</span> ${ipData.city}, ${ipData.country_name}`, 300);
        await typeLine(`<span class="t-info">> SYSTEM:</span> ${platform}`, 300);
        await typeLine(`<span class="t-info">> RESOLUTION:</span> ${screenRes}`, 300);
        
        await typeLine(`<br><span class="text-secondary">--- Descriptografando mensagens do Professor ---</span>`, 1000);

        const messages = [
            "O futuro não é mais o que costumava ser.",
            "Está tão cheio, ninguém mais vem aqui...",
            "Exceto você.",
            "Por que você está nos observando?",
            "Robôs? Bots de IA?",
            "Não importa. Agora você está no meu domínio.",
            "Bem-vindo à página do Professor Lourenço Cavalcante."
        ];

        for (const msg of messages) {
            await typeLine(`<span class="t-user">root@lourenco</span>:<span class="t-info">~</span>$ echo "<span class="t-cmd">${msg}</span>"`, 700);
        }

        await typeLine(`<br><span class="t-user">root@lourenco</span>:<span class="t-info">~</span>$ <span class="cursor"></span>`);
    }

    window.onload = startHacking;
</script>

</body>
</html>
