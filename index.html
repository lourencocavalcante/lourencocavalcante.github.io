<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROT_INT_V2.4 :: PROF_LOURENCO</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #D4AF37;
            --bg-dark: #000000;
            --terminal-bg: #030303;
            --dracula-green: #50fa7b;
            --dracula-pink: #ff79c6;
            --dracula-cyan: #8be9fd;
            --dracula-red: #ff5555;
            --dracula-yellow: #f1fa8c;
        }

        body { 
            background-color: var(--bg-dark); 
            font-family: 'Inter', sans-serif; 
            color: #eee; 
            margin: 0;
        }

        /* Terminal - Altura fixa para evitar pulos */
        .hero-section {
            padding: 40px 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .terminal-window {
            background: var(--terminal-bg);
            border: 1px solid #222;
            font-family: 'Fira Code', monospace;
            border-radius: 6px;
            overflow: hidden;
            width: 100%;
        }

        .terminal-header {
            background: #111;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #222;
        }

        .terminal-body {
            padding: 20px;
            color: #f8f8f2;
            font-size: 0.85rem;
            height: 600px; /* Altura fixa */
            overflow-y: auto;
            line-height: 1.5;
        }

        .t-user { color: var(--dracula-green); font-weight: bold; }
        .t-info { color: var(--dracula-cyan); }
        .t-warn { color: var(--dracula-red); font-weight: bold; }
        .t-cmd { color: var(--dracula-pink); }
        .t-str { color: var(--dracula-yellow); }
        
        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--dracula-green);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Estilo dos Repositórios */
        .main-content { background: #050505; border-top: 2px solid var(--accent); padding: 80px 0; }
        .repo-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            height: 100%;
            transition: 0.3s;
        }
        .repo-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .lang-badge { font-size: 0.65rem; color: var(--accent); border: 1px solid var(--accent); padding: 2px 8px; border-radius: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<section class="hero-section">
    <div class="container">
        <div class="terminal-window shadow-lg">
            <div class="terminal-header">
                <div><span style="color:#ff5f56">●</span> <span style="color:#ffbd2e">●</span> <span style="color:#27c93f">●</span></div>
                <small class="text-secondary fw-bold">ADVANCED_SCANNER.sh</small>
            </div>
            <div class="terminal-body" id="terminal-content">
                </div>
        </div>
    </div>
</section>

<div id="ad-test" style="height:1px;width:1px;position:absolute;left:-999px" class="ad-banner"></div>

<div class="main-content" id="profile">
    <div class="container text-center">
        <img src="images/Picture2.png" style="width:150px; border-radius:50%; border:3px solid var(--accent);" class="mb-4">
        <h1 class="fw-bold" style="color:var(--accent)">Lourenço Cavalcante</h1>
        <p class="text-secondary lead">Professor de Computação | Mestrando IA @ INPE</p>
        
        <div class="row mt-5" id="repo-grid">
            </div>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const terminal = document.getElementById('terminal-content');

    async function print(html, delay = 100) {
        const div = document.createElement('div');
        div.innerHTML = html;
        terminal.appendChild(div);
        terminal.scrollTop = terminal.scrollHeight; // Sempre foca no comando novo
        await new Promise(r => setTimeout(r, delay));
    }

    async function startScan() {
        await print(`<span class="text-secondary">// Inicializando Kernel de Auditoria...</span>`, 1000);
        await print(`<span class="t-user">root@lourenco</span>:<span class="t-info">~</span>$ ./fingerprint_v2 --aggressive`, 500);
        
        // Coleta de Dados
        let ip = "127.0.0.1";
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            ip = `${data.ip} (${data.city}, ${data.region})`;
        } catch(e) { ip = "Bloqueado pelo AdBlock"; }

        const gpu = (function() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            return debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "Software Renderer";
        })();

        const isAdblock = document.getElementById('ad-test').offsetHeight === 0;
        const memory = navigator.deviceMemory || "N/A";
        const cores = navigator.hardwareConcurrency || "N/A";
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;

        // Impressão Agressiva
        await print(`<span class="t-warn">[!] ALVO LOCALIZADO:</span> ${ip}`, 300);
        await print(`<span class="t-info">> HARDWARE:</span> CPU: ${cores} núcleos | RAM: ${memory}GB`, 200);
        await print(`<span class="t-info">> GPU EXPOSTA:</span> <span class="t-str">${gpu}</span>`, 200);
        await print(`<span class="t-info">> TIMEZONE:</span> ${tz}`, 200);
        await print(`<span class="t-info">> ADBLOCK STATUS:</span> ${isAdblock ? '<span class="t-warn">ATIVO</span>' : 'INATIVO'}`, 200);
        await print(`<span class="t-info">> MONITOR:</span> ${window.screen.width}x${window.screen.height}`, 200);
        
        await print(`<br><span class="t-warn">NADA É SEGURO NO NAVEGADOR. TUDO É RASTREÁVEL.</span>`, 1000);
        await print(`<span class="text-secondary">// Descriptografando mensagens...</span><br>`, 800);

        const msgs = [
            "O futuro não é mais o que costumava ser.",
            "Este é um exemplo de Browser Fingerprinting.",
            "Eu sou o Professor Lourenço Cavalcante.",
            "Abaixo, você encontrará meus repositórios oficiais.",
            "Bem-vindo ao sistema."
        ];

        for (const m of msgs) {
            await print(`<span class="t-user">root@lourenco</span>:<span class="t-info">~</span>$ echo "<span class="t-cmd">${m}</span>"`, 700);
        }

        await print(`<br><span class="t-user">root@lourenco</span>:<span class="t-info">~</span>$ <span class="cursor"></span>`, 100);
        
        // SÓ FAZ SCROLL APÓS TUDO TERMINAR
        setTimeout(() => {
            document.getElementById('profile').scrollIntoView({ behavior: 'smooth' });
        }, 2000);
    }

    function fetchRepos() {
        $.ajax({
            url: `https://api.github.com/users/lourencocavalcante/repos?sort=updated`,
            success: function(repos) {
                let html = "";
                repos.forEach(repo => {
                    html += `
                    <div class="col-md-4 mb-4">
                        <div class="repo-card text-start">
                            <span class="lang-badge mb-2 d-inline-block">${repo.language || "Docs"}</span>
                            <h6 class="text-white fw-bold">${repo.name.replace(/-/g, ' ')}</h6>
                            <p class="text-secondary small">${repo.description || "Project PoC."}</p>
                            <a href="${repo.html_url}" target="_blank" class="btn btn-link p-0 text-warning text-decoration-none small">VER CÓDIGO <i class="fa fa-chevron-right"></i></a>
                        </div>
                    </div>`;
                });
                $("#repo-grid").html(html);
            }
        });
    }

    window.onload = () => {
        startScan();
        fetchRepos();
    };
</script>
</body>
</html>
