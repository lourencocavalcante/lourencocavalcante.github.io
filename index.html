<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lourenço Cavalcante | IA & Computação</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #D4AF37; /* Dourado */
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-gray: #b0b0b0;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Navbar Glassmorphism */
        .navbar {
            background: rgba(15, 15, 15, 0.85) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 1rem 0;
        }

        .navbar-brand img {
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5));
        }

        /* Terminal Section */
        .wallpaper {
            height: 70vh;
            display: flex;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0f0f0f 100%);
        }

        .console {
            font-family: 'Fira Code', monospace;
            background: #000;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 800px;
            margin: auto;
        }

        .prompt p {
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        /* Profile Card */
        .myprofile {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 50px;
            margin-top: -50px;
            margin-bottom: 80px;
            border: 1px solid #333;
            transition: transform 0.3s ease;
        }

        .profile-img-container {
            text-align: center;
        }

        .vinod {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 5px solid var(--accent);
            object-fit: cover;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .vinod:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        /* Typography */
        h2 { color: var(--accent); font-weight: 700; }
        h5 { color: var(--text-gray); font-weight: 300; margin-bottom: 12px; font-size: 1rem; }
        
        /* Social Icons Modernizados */
        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #2a2a2a;
            color: #fff !important;
            margin-right: 12px;
            text-decoration: none;
            transition: 0.3s;
        }

        .social-link:hover {
            background: var(--accent);
            transform: translateY(-5px);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f0f0f; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: var(--accent);
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 768px) {
            .myprofile { text-align: center; padding: 30px; }
            .console { font-size: 0.8rem; margin: 0 15px; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="images/vinod-logo.png" alt="Logo" style="height: 50px;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="repositories.html">GitHub</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Disciplinas IFTO</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="wallpaper">
        <div class="container">
            <div class="console shadow-lg">
                <div class="prompt" id="terminal-content">
                    </div>
            </div>
        </div>
    </section>

    <div class="container">
        <div class="row myprofile align-items-center">
            <div class="col-lg-4 profile-img-container">
                <img class="vinod shadow" src="images/Picture2.jpg" onclick="location.href='repositories.html'"/>
            </div>
            <div class="col-lg-8">
                <div class="mt-4 mt-lg-0">
                    <h2>Lourenço Cavalcante</h2>
                    <h5><i class="fa-solid fa-briefcase me-2"></i>Professor Efetivo @ IFTO (desde 2016)</h5>
                    <h5><i class="fa-solid fa-graduation-cap me-2"></i>Mestrando em Computação Aplicada / IA (INPE)</h5>
                    <h5><i class="fa-solid fa-code me-2"></i>Especialista em Informática na Educação</h5>
                    
                    <div class="mt-4">
                        <p class="text-secondary small text-uppercase fw-bold">Conecte-se comigo</p>
                        <a href="https://github.com/lourencocavalcante" target="_blank" class="social-link"><i class="fab fa-github"></i></a>
                        <a href="https://www.linkedin.com/in/lourenco-cavalcante-790b24121/" target="_blank" class="social-link"><i class="fab fa-linkedin-in"></i></a>
                        <a href="https://www.instagram.com/lourenco.cavalcante7/" target="_blank" class="social-link"><i class="fab fa-instagram"></i></a>
                        <a href="#" class="social-link"><i class="fa-solid fa-envelope"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-4 text-center text-secondary">
        <small>&copy; 2026 Lourenço Cavalcante. Desenvolvido com foco em IA.</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const lines = [
            "O futuro não é mais o que costumava ser.",
            "Está tão cheio, ninguém mais vem aqui...",
            "Exceto uma pessoa.",
            "Quem visita este lugar regularmente?",
            "Robôs? Bots de IA?",
            "Não. É o nosso Professor:",
            "Lourenço Cavalcante"
        ];

        const terminal = document.getElementById('terminal-content');
        
        async function typeWriter(text, element) {
            const promptSpan = document.createElement('p');
            promptSpan.innerHTML = `<span style="color:#00FF00;">root@lourenco</span>:<span style="color:lightblue;">~</span>$ echo "`;
            element.appendChild(promptSpan);

            for (let i = 0; i < text.length; i++) {
                promptSpan.innerHTML += text.charAt(i);
                await new Promise(r => setTimeout(r, 40));
            }
            promptSpan.innerHTML += `"`;
        }

        async function initTerminal() {
            for (const line of lines) {
                await typeWriter(line, terminal);
                await new Promise(r => setTimeout(r, 400));
            }
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            terminal.appendChild(cursor);
        }

        window.onload = initTerminal;
    </script>
</body>
</html>
